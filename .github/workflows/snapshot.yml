name: snapshot

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: '42 1 * * 0'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      need_update: ${{ steps.check-result.outputs.need_update }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: python -m pip install .
      - id: check-result
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: echo "need_update=$(snap check)" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        edition: ['en', 'es', 'fr']
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6

      - name: Get date
        id: get-date
        run: echo "date=$(/bin/date -u "+%Y%m%d")" >> "$GITHUB_OUTPUT"

      - name: Get tag
        id: get-tag
        run: echo "tag=${{ (github.event_name == 'push' && github.ref_name) || steps.get-date.outputs.date }}" >> "$GITHUB_OUTPUT"

      - if: matrix.edition == 'en'
        run: gh release create ${{ steps.get-tag.outputs.tag }} -d

      - run: python -m pip install .
      - run: snap build ${{ matrix.edition }}
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - run: gh release upload ${{ steps.get-tag.outputs.tag }} build/*.json build/*.zst
      - if: contains(fromJSON('["fr"]'), matrix.edition)
        run: gh release upload ${{ steps.get-tag.outputs.tag }} build/*.zim

  release:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - run: gh release edit ${{ needs.build.outputs.tag }} --draft=false --latest
