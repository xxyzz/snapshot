name: snapshot

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: '42 1 5 * *'
  workflow_dispatch:

permissions:
  contents: write
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TELEMETRY: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      need_update: ${{ steps.check-result.outputs.need_update }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
      - run: python -m pip install .
      - id: check-result
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          ACCESSTOKEN: ${{ secrets.ACCESSTOKEN }}
          REFRESHTOKEN: ${{ secrets.REFRESHTOKEN }}
          GH_TOKEN: ${{ secrets.PAT }}
        run: echo "need_update=$(snap check)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          path: build/info.json

  build:
    needs: check
    if: needs.check.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 6
      matrix:
        edition:
          - 'en'
          - 'es'
          - 'fr'
          - 'ru'
          - 'de'
          - 'zh'
          - 'ja'
          - 'pl'
          - 'el'
          - 'nl'
          - 'th'
          - 'fi'
          - 'sv'
          - 'simple'
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
      - uses: actions/download-artifact@v8
        with:
          path: build

      - name: Get date
        id: get-date
        run: echo "date=$(/bin/date -u "+%Y%m%d")" >> "$GITHUB_OUTPUT"

      - name: Get tag
        id: get-tag
        run: |
          echo "tag=${{
            (github.event_name == 'push' && github.ref_name) ||
            steps.get-date.outputs.date
          }}" >> "$GITHUB_OUTPUT"

      - if: matrix.edition == 'en'
        run: gh release create ${{ steps.get-tag.outputs.tag }} -d

      - run: python -m pip install .
      - run: snap build ${{ matrix.edition }}
        env:
          ACCESSTOKEN: ${{ secrets.ACCESSTOKEN }}

      - run: |
          rm build/info.json
          gh release upload ${{ steps.get-tag.outputs.tag }} build/*.json build/*.zst
      - if: contains(fromJSON('["fr", "de"]'), matrix.edition)
        run: gh release upload ${{ steps.get-tag.outputs.tag }} build/*.zim

  release:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: gh release edit ${{ needs.build.outputs.tag }} --draft=false --latest
